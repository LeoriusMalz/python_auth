name: SAST Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip3 install bandit flake8 radon

      - name: Run SAST script
        run: |
          chmod +x run_sast.sh
          ./run_sast.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/