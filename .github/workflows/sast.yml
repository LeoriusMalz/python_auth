name: SAST Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip3 install bandit flake8 radon

      - name: Run SAST script
        run: |
          chmod +x run_sast.sh
          ./run_sast.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/

      - name: Commit reports
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add reports/
          git commit -m "Update SAST reports" || echo "No changes"
          git push

      - name: Summary
        run: |
          echo "## SAST Results" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: completed" >> $GITHUB_STEP_SUMMARY
          echo "- Flake8: completed" >> $GITHUB_STEP_SUMMARY
          echo "- Radon: completed" >> $GITHUB_STEP_SUMMARY